- name: system setup | openssh | install or update OpenSSH package (Linux)
  tags: openssh, ssh, system, settings
  package:
    name: "{{ openssh_package }}"
    state: latest
  notify: restart_sshd
  when:
    - ansible_system == "Linux"
    - openssh_package is defined
    - openssh_package | length > 0

- name: system setup | openssh | enable Remote Login (macOS)
  tags: openssh, ssh, system, settings
  command: systemsetup -setremotelogin on
  changed_when: false
  when: ansible_os_family == "Darwin"

- name: system setup | openssh | ensure ssh config directory exists (Linux)
  tags: openssh, ssh, system, settings
  file:
    path: /etc/ssh
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: ansible_system == "Linux"

- name: system setup | openssh | ensure ssh config directory exists (macOS)
  tags: openssh, ssh, system, settings
  file:
    path: /etc/ssh
    state: directory
    owner: root
    group: wheel
    mode: "0755"
  when: ansible_os_family == "Darwin"

- name: system setup | openssh | ensure sshd_config exists (Linux)
  tags: openssh, ssh, system, settings
  file:
    path: /etc/ssh/sshd_config
    state: touch
    owner: root
    group: root
    mode: "0644"
  when: ansible_system == "Linux"

- name: system setup | openssh | ensure sshd_config exists (macOS)
  tags: openssh, ssh, system, settings
  file:
    path: /etc/ssh/sshd_config
    state: touch
    owner: root
    group: wheel
    mode: "0644"
  when: ansible_os_family == "Darwin"

- name: system setup | openssh | configure sshd settings (Linux and macOS)
  tags: openssh, ssh, system, settings
  blockinfile:
    path: /etc/ssh/sshd_config
    marker: "# {mark} ANSIBLE MANAGED SSH SETTINGS"
    block: |
      Port {{ security_ssh_port }}
      PasswordAuthentication {{ security_ssh_password_authentication }}
      PermitRootLogin {{ security_ssh_permit_root_login }}
      UseDNS {{ security_ssh_usedns }}
      PermitEmptyPasswords {{ security_ssh_permit_empty_password }}
      ChallengeResponseAuthentication {{ security_ssh_challenge_response_auth }}
      GSSAPIAuthentication {{ security_ssh_gss_api_authentication }}
      X11Forwarding {{ security_ssh_x11_forwarding }}
      AllowUsers {{ security_ssh_allowed_users }}
  notify: "{{ 'restart_sshd_macos' if ansible_os_family == 'Darwin' else 'restart_sshd' }}"
  when:
    - ansible_system == "Linux" or ansible_os_family == "Darwin"
    - security_ssh_port is defined

- name: system setup | openssh | ensure sshd is enabled and running (Linux)
  tags: openssh, ssh, system, settings
  service:
    name: "{{ openssh_service }}"
    enabled: true
    state: started
  when:
    - ansible_system == "Linux"
    - openssh_service is defined
    - openssh_service | length > 0

- name: system setup | openssh | run pending handlers now
  tags: openssh, ssh, system, settings
  meta: flush_handlers
  when: ansible_system == "Linux" or ansible_os_family == "Darwin"


- name: system setup | openssh | check SSH is listening on port {{ security_ssh_port }} (Linux)
  tags: openssh, ssh, system, settings
  become: false
  shell: "ss -tuln | grep -E ':(?:{{ security_ssh_port }})\\b'"
  register: ssh_port_check_linux
  failed_when: ssh_port_check_linux.stdout == ""
  changed_when: false
  when:
    - ansible_system == "Linux"
    - security_ssh_port is defined
