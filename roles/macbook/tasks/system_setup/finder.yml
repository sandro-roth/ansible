- block:

    - name: macbook | finder | set default folder to Documents
      community.general.osx_defaults:
        domain: com.apple.finder
        key: NewWindowTarget
        type: string
        value: PfLo

    - name: macbook | finder | set default folder path
      community.general.osx_defaults:
        domain: com.apple.finder
        key: NewWindowTargetPath
        type: string
        value: "file://${HOME}/Documents/"

    - name: macbook | finder | show file extensions
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: AppleShowAllExtensions
        type: bool
        value: true

  become: false
  notify: restart finder

- block:
    - name: macbook | finder sidebar | ensure sidebar editor dependency is installed
      community.general.homebrew:
        name:
          - git
        state: present
        path: "{{ macbook_homebrew_bin }}"

    - name: macbook | finder sidebar | clone sbedit repository
      ansible.builtin.git:
        repo: https://github.com/fabienconus/sidebar-editor.git
        dest: "{{ macbook_sbedit_root }}"
        version: main
        force: true
        update: true

    - name: macbook | finder sidebar | check pkg exists
      ansible.builtin.stat:
        path: "{{ macbook_sbedit_pkg }}"
      register: macbook_sbedit_pkg_stat

    - name: macbook | finder sidebar | fail if pkg is missing
      ansible.builtin.fail:
        msg: "sbedit pkg was not found at {{ macbook_sbedit_pkg }}"
      when: not macbook_sbedit_pkg_stat.stat.exists

    - name: macbook | finder sidebar | install sbedit pkg
      ansible.builtin.command:
        argv:
          - /usr/sbin/installer
          - -pkg
          - "{{ macbook_sbedit_pkg }}"
          - -target
          - /
      become: true
      changed_when: true

    - name: macbook | finder sidebar | remove all sidebar favorites
      ansible.builtin.command:
        argv:
          - "{{ macbook_sbedit_binary }}"
          - --removeAll
      changed_when: true
      notify: restart finder

    - name: macbook | finder sidebar | add wanted sidebar favorites
      ansible.builtin.command:
        argv:
          - "{{ macbook_sbedit_binary }}"
          - --add
          - "{{ item }}"
      loop: "{{ macbook_finder_sidebar_items }}"
      changed_when: true
      notify: restart finder

    - name: macbook | finder sidebar | reload sidebar
      ansible.builtin.command:
        argv:
          - "{{ macbook_sbedit_binary }}"
          - --reload
          - --force
      changed_when: true
      notify: restart finder

  become: false