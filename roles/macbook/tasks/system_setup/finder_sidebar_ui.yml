---
- block:
    - name: macbook | finder sidebar ui | configure finder sidebar
      ansible.builtin.shell: |
        osascript <<'APPLESCRIPT'
        tell application "Finder"
          activate
        end tell

        delay 1.5

        tell application "System Events"
          tell process "Finder"
            set frontmost to true
            delay 0.5

            tell menu bar 1
              tell menu bar item "Finder"
                tell menu 1
                  if exists menu item "Settings…" then
                    click menu item "Settings…"
                  else if exists menu item "Preferences…" then
                    click menu item "Preferences…"
                  else if exists menu item "Einstellungen…" then
                    click menu item "Einstellungen…"
                  else
                    error "Could not find Finder Settings or Preferences menu item"
                  end if
                end tell
              end tell
            end tell

            delay 2

            if not (exists window 1) then
              error "Finder settings window did not open"
            end if

            tell window 1
              click button 3 of toolbar 1
              delay 1

              tell scroll area 1
                set cbList to checkboxes

                -- Recents off
                if value of item 1 of cbList is 1 then click item 1 of cbList

                -- Shared off
                if value of item 2 of cbList is 1 then click item 2 of cbList

                -- Favorites
                -- Applications on
                if value of item 3 of cbList is 0 then click item 3 of cbList

                -- Desktop off
                if value of item 4 of cbList is 1 then click item 4 of cbList

                -- Documents on
                if value of item 5 of cbList is 0 then click item 5 of cbList

                -- Downloads on
                if value of item 6 of cbList is 0 then click item 6 of cbList

                -- Movies off
                if value of item 7 of cbList is 1 then click item 7 of cbList

                -- Music off
                if value of item 8 of cbList is 1 then click item 8 of cbList

                -- Pictures off
                if value of item 9 of cbList is 1 then click item 9 of cbList

                -- Locations
                -- iCloud Drive off
                if value of item 10 of cbList is 1 then click item 10 of cbList

                -- Cloud Storage off
                if value of item 11 of cbList is 1 then click item 11 of cbList

                -- Home off
                if value of item 12 of cbList is 1 then click item 12 of cbList

                -- MyBook on
                if value of item 13 of cbList is 0 then click item 13 of cbList

                -- Hard disks off
                if value of item 14 of cbList is 1 then click item 14 of cbList

                -- External disks on
                if value of item 15 of cbList is 0 then click item 15 of cbList

                -- CDs/DVDs/iOS off
                if value of item 16 of cbList is 1 then click item 16 of cbList

                -- AirDrop on
                if value of item 17 of cbList is 0 then click item 17 of cbList

                -- Bonjour computers off
                if value of item 18 of cbList is 1 then click item 18 of cbList

                -- Connected servers on
                if value of item 19 of cbList is 0 then click item 19 of cbList

                -- Trash off
                if value of item 20 of cbList is 1 then click item 20 of cbList

                -- Recent Tags off
                if value of item 21 of cbList is 1 then click item 21 of cbList
              end tell

              keystroke "w" using command down
            end tell
          end tell
        end tell
        APPLESCRIPT
      args:
        executable: /bin/bash
      changed_when: true
      notify: restart finder

  become: false