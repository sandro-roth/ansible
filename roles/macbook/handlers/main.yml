- name: restart dock
  ansible.builtin.command: killall Dock
  changed_when: true
  become: false

- name: restart finder
  ansible.builtin.command: killall Finder
  changed_when: true
  become: false

- name: restart systemuiserver
  ansible.builtin.command: killall SystemUIServer
  changed_when: true
  failed_when: false
  become: false

- name: restart cfprefsd
  command: killall cfprefsd
  changed_when: true
  failed_when: false
  become: false