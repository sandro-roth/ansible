- hosts: mac
  tags: always, bootstrap
  gather_facts: false
  become: true
  tasks:
    - name: bootstrap | macOS | check if Command Line Tool are installed
      raw: xcode-select -p
      register: clt_check
      changed_when: false
      failed_when: false

    - name: bootstrap | macOS | install Command Line Tools
      raw: |
        touch /tmp/.com.apple.dt.CommandLineTools.installondemand.in-progress
        PROD=$(softwareupdate -l 2>/dev/null | awk -F'*' '/Command Line Tools/ {print $2}' | sed 's/^ *//' | tail -n 1)
        if [ -n "$PROD" ]; then
          softwareupdate -i "$PROD" --verbose
        fi
        rm -f /tmp/.com.apple.dt.CommandLineTools.installondemand.in-progress
      when: clt_check.rc != 0

    - name: bootstrap | macOS | reset connection
      meta: reset_connection

# tasks to complete before running roles
- hosts: all
  tags: always
  gather_facts: false
  become: true
  pre_tasks:
    - name: pre-run | update package cache (arch)
      tags: always
      pacman: update_cache=yes
      changed_when: False
      when: ansible_distribution == "Archlinux"

    - name: pre-run | update package cache (debian, etc)
      tags: always
      apt: update_cache=yes
      changed_when: False
      when: ansible_distribution in ["Debian", "Ubuntu"]

- hosts: mac
  tags: gather_facts, always
  gather_facts: true
  become: false
  tasks: []

# run roles

- hosts: all
  tags: base
  gather_facts: false
  become: true
  roles:
    - base
    - docker

- hosts: tower
  tags: ricing
  become: true
  roles:
    - customize_tower

- hosts: mac
  tags: macbook
  gather_facts: false
  become: true
  roles:
    - macbook

- hosts: server
  tags: server
  become: true
  roles:
    - server

# end of run cleanup and reporting
- hosts: all
  become: true
  tasks:
  - name: cleanup package cache (debian and ubuntu)
    tags: always
    apt:
      autoclean: yes
    changed_when: False
    when: ansible_distribution in ["Debian", "Ubuntu"]

  - name: autoremove orphan packages (debian and ubuntu)
    tags: always
    apt:
      autoremove: yes
      purge: yes
    when: ansible_distribution in ["Debian", "Ubuntu"]

